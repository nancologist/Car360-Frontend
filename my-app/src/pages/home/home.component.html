<div class="home">
    <div class="car-container" *ngIf="carThumbnailsState$ | async as state">
        <app-card
            *ngFor="let carInfo of state.data; trackBy: trackByCarId"
            [car]="carInfo"
            (cardClicked)="onCardClicked($event)"
        />
        <p *ngIf="state.data === null && state.loading">Loading car infos...</p>
        <p *ngIf="state.data !== null && state.data.length === 0">No cars available at the moment.</p>
    </div>

</div>
