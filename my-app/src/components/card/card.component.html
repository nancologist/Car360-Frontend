<mat-card
    *ngIf="car"
    class="car-card"
>
    <div class="card-header">
        <img
            [height]="128"
            [width]="128"
            alt="{{ car.name }}"
            mat-card-image
            src="assets/images/bmw-f11.jpeg"
        >
        <div
            class="title"
        >
            <h3>{{car.name}}</h3>
            <span>{{ car.productionDate | date }}</span>
            <p>{{ car.color }}</p>
        </div>
    </div>

    <div class="card-footer">
        <button
            (click)="viewCarDetails(car.carId)"
            mat-button
        >View Details
        </button>
    </div>
</mat-card>
